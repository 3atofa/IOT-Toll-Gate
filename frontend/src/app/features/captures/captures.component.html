<section class="min-h-screen bg-slate-100 p-4 md:p-8">
  <div class="mx-auto max-w-6xl rounded-2xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
    <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
      <h1 class="text-2xl font-black text-slate-900">Capture History</h1>
      <button
        type="button"
        (click)="loadCaptures()"
        class="inline-flex items-center gap-2 rounded-lg border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50"
      >
        <i class="fa-solid fa-arrows-rotate"></i>
        Refresh
      </button>
    </div>

    <div *ngIf="loading" class="py-6 text-center text-slate-600">Loading capture history...</div>

    <div *ngIf="!loading" class="overflow-x-auto">
      <table class="w-full min-w-[760px] border-collapse">
        <thead>
          <tr class="border-b border-slate-200 text-left text-xs uppercase tracking-wide text-slate-500">
            <th class="pb-3 pr-4">Image</th>
            <th class="pb-3 pr-4">Event</th>
            <th class="pb-3 pr-4">Gate</th>
            <th class="pb-3 pr-4">Card UID</th>
            <th class="pb-3">Captured At</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of captures" class="border-b border-slate-100 align-top">
            <td class="py-4 pr-4">
              <img [src]="displayImageUrl(item.imagePath)" alt="capture" class="h-20 w-28 rounded-lg object-cover ring-1 ring-slate-200" />
            </td>
            <td class="py-4 pr-4 text-sm font-semibold text-slate-900">{{ item.eventType }}</td>
            <td class="py-4 pr-4 text-sm text-slate-700">{{ item.gateId }}</td>
            <td class="py-4 pr-4 text-sm text-slate-700">{{ item.cardUid || 'N/A' }}</td>
            <td class="py-4 text-sm text-slate-700">{{ item.capturedAt | date: 'MMM d, y, h:mm:ss a' }}</td>
          </tr>
        </tbody>
      </table>

      <p *ngIf="captures.length === 0" class="py-8 text-center text-slate-500">No captures recorded yet.</p>
    </div>
  </div>
</section>
